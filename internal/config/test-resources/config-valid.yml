version: 2

settings:
  logging:
    level: debug
    pretty: true
  working-dir: /tmp
  max-concurrency: 2

env:
  WHATEVER: "global value"

groups:
  - name: global-env
    description: "This runs program 1"
    command: "echo"
    params: ["$WHATEVER"]
    shell: /bin/sh

  - name: scoped-env
    description: "Runs program 2 with a scoped env override"
    command: "echo"
    params: ["$WHATEVER"]
    shell: /bin/sh
    env:
      WHATEVER: "scoped value"

  - name: combined-responses
    description: "Combines outputs of the two prior groups"
    command: "echo"
    params:
      - "combined: {{ output.global-env }} + {{ output.scoped-env }}"

default: pipeline

flows:
  pipeline:
    description: "Two parallel producers, then a consumer that joins both outputs"
    mode: step
    steps:
      - run: ["global-env", "scoped-env"]
      - run: ["combined-responses"]

  pipeline-dag:
    description: "Same shape, scheduled topologically from data deps"
    mode: dag
    run: ["global-env", "scoped-env", "combined-responses"]
